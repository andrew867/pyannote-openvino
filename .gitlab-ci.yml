image: python:3.12-slim

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"

cache:
  paths:
    - .pip-cache

stages:
  - test
  - release

before_script:
  - export PIP_CACHE_DIR="$CI_PROJECT_DIR/.pip-cache"
  - mkdir -p "$PIP_CACHE_DIR"
  - python -m pip install --upgrade pip

test:
  stage: test
  script:
    - python -m pip install -e .[stt,test]
    - |
      if [ -f models/ov/segmentation.xml ] && [ -f models/ov/embedding.xml ]; then
        echo "OV artifacts found: integration test will run."
      else
        echo "OV artifacts missing: integration test will be skipped by pytest."
      fi
    - python -m pytest -ra

release:
  stage: release
  only:
    - tags
  script:
    - python -m pip install -e .[stt,test,build]
    - |
      if [ -f models/ov/segmentation.xml ] && [ -f models/ov/embedding.xml ]; then
        echo "OV artifacts found: integration test will run."
      else
        echo "OV artifacts missing: integration test will be skipped by pytest."
      fi
    - python -m pytest -ra
    - python -m build
  artifacts:
    paths:
      - dist/*
    expire_in: 1 week
